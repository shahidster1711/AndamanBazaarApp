<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AndamanBazaar - Local Marketplace</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050507">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: {
                DEFAULT: '#00d992',
                50: '#e6fff4',
                100: '#ccffea',
                200: '#99ffd5',
                300: '#66ffbf',
                400: '#33ffaa',
                500: '#00d992',
                600: '#00b37a',
                700: '#008c62',
                800: '#00664a',
                900: '#004031',
                950: '#001a14',
              },
              mint: '#2fd6a1',
              abyss: '#050507',
              carbon: '#101010',
              warm: '#3d3a39',
              snow: '#f2f2f2',
              parchment: '#b8b3b0',
              slate: {
                500: '#8b949e',
              }
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
              heading: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Ubuntu', 'Cantarell', 'Noto Sans', 'Helvetica', 'Arial', 'sans-serif'],
              mono: ['SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', 'monospace'],
            },
            borderRadius: {
              'premium': '8px',
              'pill': '9999px'
            },
            boxShadow: {
              'glow': '0 0 15px rgba(0, 217, 146, 0.1)',
              'elevation-low': 'rgba(92, 88, 85, 0.2) 0px 0px 15px',
              'elevation-high': 'rgba(0, 0, 0, 0.7) 0px 20px 60px',
            }
          }
        }
      }
    </script>
    <style>
        body { 
          font-family: 'Inter', sans-serif; 
          background-color: #050507;
          color: #f2f2f2;
          -webkit-font-smoothing: antialiased;
          font-feature-settings: "calt", "rlig";
        }
        
        h1, h2, h3, h4, h5, h6 {
          font-family: system-ui, sans-serif;
          line-height: 1.1;
          letter-spacing: -0.02em;
        }

        .hero-heading {
          font-size: 3.75rem;
          line-height: 1.0;
          letter-spacing: -0.65px;
        }

        .section-heading {
          font-size: 2.25rem;
          line-height: 1.11;
          letter-spacing: -0.9px;
        }

        .glass {
          background: rgba(16, 16, 16, 0.8);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border-bottom: 1px solid #3d3a39;
        }

        .premium-card {
          background: #101010;
          border-radius: 8px;
          transition: all 0.3s ease;
          border: 1px solid #3d3a39;
        }
        .premium-card:hover {
          border-color: #00d992;
          box-shadow: rgba(92, 88, 85, 0.2) 0px 0px 15px;
        }

        .btn-premium {
          background: #101010;
          color: #2fd6a1;
          border-radius: 6px;
          font-weight: 700;
          transition: all 0.2s ease;
          border: 1px solid #3d3a39;
          padding: 12px 16px;
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }
        .btn-premium:hover {
          background: rgba(0, 0, 0, 0.2);
          opacity: 0.8;
          border-color: #00d992;
        }
        .btn-premium:active {
          transform: scale(0.98);
        }

        .btn-ghost {
          background: transparent;
          color: #ffffff;
          border: 1px solid #3d3a39;
          border-radius: 6px;
          padding: 12px 16px;
          transition: all 0.2s ease;
        }
        .btn-ghost:hover {
          background: rgba(0, 0, 0, 0.2);
          opacity: 0.4;
        }

        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }
        .skeleton {
          background: linear-gradient(90deg, #101010 25%, #1a1a1a 50%, #101010 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite linear;
          border-radius: 8px;
        }

        .mask-fade-right {
          mask-image: linear-gradient(to right, black 80%, transparent 100%);
          -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }

        @keyframes pulse-glow {
          0% { filter: drop-shadow(0 0 2px #00d992); }
          50% { filter: drop-shadow(0 0 8px #00d992); }
          100% { filter: drop-shadow(0 0 2px #00d992); }
        }
        .logo-glow {
          animation: pulse-glow 3s infinite ease-in-out;
        }

        code, pre {
          font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
          background: #101010;
          border-radius: 6.4px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3d3a39; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00d992; }

        @keyframes slideUp {
          from { transform: translateY(20px); opacity: 0; }
          to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?deps=react@18.2.0,react-dom@18.2.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.2.0,react-dom@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0,react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
