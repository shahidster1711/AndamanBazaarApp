<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AndamanBazaar - Local Marketplace</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FF385C">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              rausch: {
                DEFAULT: '#FF385C',
                50: '#FFF1F3',
                100: '#FFE4E8',
                200: '#FFCAD3',
                300: '#FFA3B2',
                400: '#FF7185',
                500: '#FF385C',
                600: '#E61E4D',
                700: '#B2173F',
              },
              babu: {
                DEFAULT: '#00A699',
                50: '#E6F6F5',
                100: '#CCEEEC',
                200: '#99DED9',
                300: '#66CEC6',
                400: '#33BEB3',
                500: '#00A699',
              },
              foggy: '#484848',
              hof: '#222222',
              arches: '#F7F7F7'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Inter', 'sans-serif'],
            },
            borderRadius: {
              'airbnb': '12px',
              'airbnb-lg': '24px'
            },
            boxShadow: {
              'airbnb': '0 6px 16px rgba(0,0,0,0.12)',
              'airbnb-hover': '0 12px 24px rgba(0,0,0,0.15)',
            }
          }
        }
      }
    </script>
    <style>
        body { 
          font-family: 'Inter', sans-serif; 
          background-color: #ffffff;
          color: #222222;
          -webkit-font-smoothing: antialiased;
        }
        
        .glass {
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(8px);
          -webkit-backdrop-filter: blur(8px);
        }

        .airbnb-card {
          background: #ffffff;
          border-radius: 12px;
          transition: all 0.2s ease-in-out;
          border: 1px solid #DDDDDD;
        }
        .airbnb-card:hover {
          box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .airbnb-button {
          background: linear-gradient(to right, #E61E4D 0%, #E31C5F 50%, #D70466 100%);
          color: white;
          border-radius: 8px;
          font-weight: 600;
          transition: transform 0.1s ease;
        }
        .airbnb-button:active {
          transform: scale(0.96);
        }

        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }
        .skeleton {
          background: linear-gradient(90deg, #F7F7F7 25%, #EBEBEB 50%, #F7F7F7 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite linear;
          border-radius: 12px;
        }

        .safe-bottom {
          padding-bottom: env(safe-area-inset-bottom);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #DDDDDD; border-radius: 10px; }

        @keyframes slideUp {
          from { transform: translateY(12px); opacity: 0; }
          to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?deps=react@18.2.0,react-dom@18.2.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.2.0,react-dom@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0,react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
    <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
